name: npm Maintenance

on:
  workflow_dispatch:

jobs:
  access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm access public @jackokerman/comment-width-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm view @jackokerman/comment-width-check version dist-tags bin --json
